services:
  webpass:
    image: ghcr.io/johnwmail/webpass:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-vdev-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        COMMIT: ${COMMIT:-unknown}
        FRONTEND_VERSION: ${FRONTEND_VERSION:-vdev-unknown}
        FRONTEND_BUILD_TIME: ${FRONTEND_BUILD_TIME:-unknown}
        FRONTEND_COMMIT: ${FRONTEND_COMMIT:-unknown}
    environment:
      # Frontend build metadata (passed to container for /api/version endpoint)
      - VERSION=${VERSION:-vdev-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
      - COMMIT=${COMMIT:-unknown}
      # Runtime configuration
      - JWT_SECRET=${JWT_SECRET:-change-me-to-random-32-byte-hex}
      - DB_PATH=/data/db/db.sqlite3
      - STATIC_DIR=/app/frontend/dist
      - GIT_REPO_ROOT=/data/git-repos
      # Registration protection mode (TOTP-based)
      - REGISTRATION_ENABLED=${REGISTRATION_ENABLED:-false}
      - REGISTRATION_TOTP_SECRET=${REGISTRATION_TOTP_SECRET:-}
      - REGISTRATION_TOTP_PERIOD=${REGISTRATION_TOTP_PERIOD:-3600}
      - REGISTRATION_TOTP_ALGO=${REGISTRATION_TOTP_ALGO:-SHA1}
      - REGISTRATION_CODE_FILE=/data/registration_code.txt
    container_name: webpass
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - webpass-data:/data
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - webpass-network

volumes:
  webpass-data:
    driver: local

networks:
  webpass-network:
    driver: bridge

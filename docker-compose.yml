services:
  webpass:
    image: ghcr.io/johnwmail/webpass:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: vdev-${BUILD_TIME:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        COMMIT: ${COMMIT:-unknown}
        FRONTEND_VERSION: vdev-${BUILD_TIME:-unknown}
        FRONTEND_BUILD_TIME: ${BUILD_TIME:-unknown}
        FRONTEND_COMMIT: ${COMMIT:-unknown}
    environment:
      # Frontend build metadata
      - FRONTEND_VERSION=vdev-${BUILD_TIME:-unknown}
      - FRONTEND_BUILD_TIME=${BUILD_TIME:-unknown}
      - FRONTEND_COMMIT=${COMMIT:-unknown}
      # Runtime configuration
      - JWT_SECRET=${JWT_SECRET:-change-me-to-random-32-byte-hex}
      - DB_PATH=/data/db/db.sqlite3
      - STATIC_DIR=/app/frontend/dist
      - GIT_REPO_ROOT=/data/git-repos
    container_name: webpass
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - webpass-data:/data
    read_only: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - webpass-network

volumes:
  webpass-data:
    driver: local

networks:
  webpass-network:
    driver: bridge

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm test

      - name: Run Go tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: backend
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

      - name: Run frontend linter
        run: cd frontend && npm run lint

      - name: Run frontend type check
        run: cd frontend && npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build backend
        run: go build -o webpass-server ./cmd/srv

      - name: Test binary
        run: ./webpass-server --help || true

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: webpass:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d \
            --name webpass-test \
            -p 8080:8080 \
            -e JWT_SECRET=$(openssl rand -hex 32) \
            webpass:test

      - name: Wait for health check
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080/api/health | grep -q '"status":"ok"'; then
              echo "Service is healthy!"
              exit 0
            fi
            echo "Waiting for service... ($i/30)"
            sleep 2
          done
          echo "Service failed to start"
          exit 1

      - name: Test health endpoint
        run: |
          response=$(curl -s http://localhost:8080/api/health)
          echo "Health response: $response"
          echo "$response" | grep -q '"status":"ok"' && echo "✓ Health check passed"

      - name: Test frontend serving
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "Frontend status: $status"
          [[ "$status" == "200" ]] && echo "✓ Frontend serving passed"

      - name: Test setup endpoint
        run: |
          response=$(curl -s -X POST http://localhost:8080/api \
            -H "Content-Type: application/json" \
            -d '{"password":"test123","public_key":"test-key","fingerprint":"test-fp"}')
          echo "Setup response: $response"
          [[ "$response" == *"fingerprint"* ]] && echo "✓ Setup endpoint passed"

      - name: Show container logs
        if: always()
        run: docker logs webpass-test

      - name: Cleanup
        if: always()
        run: |
          docker stop webpass-test
          docker rm webpass-test

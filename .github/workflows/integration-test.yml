name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  integration-test:
    name: Playwright E2E
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build backend binary
        run: go build -o webpass-server ./cmd/srv

      - name: Start server
        run: |
          JWT_SECRET=$(openssl rand -hex 32) \
          DB_PATH=:memory: \
          STATIC_DIR=frontend/dist \
          DISABLE_FRONTEND=false \
          GIT_REPO_ROOT=./git-repos \
          ./webpass-server &
          echo "Server started with PID $!"

      - name: Wait for server health
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080/api/health | grep -q '"status":"ok"'; then
              echo "Server is healthy!"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: cd frontend && npx playwright test
        env:
          TEST_BASE_URL: http://localhost:8080
          TEST_SKIP_WEBSERVER: "true"

      - name: Upload test results (HTML report)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-html-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test results (screenshots/videos)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7

      - name: Upload test results (JSON)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-json-results
          path: frontend/test-results/results.json
          retention-days: 7

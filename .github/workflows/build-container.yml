name: Build Container

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Push Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine image tags and version info
        id: version
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Tag trigger: strip 'v' prefix and add latest
            TAG_NAME="${{ github.ref_name }}"
            VERSION_TAG="${TAG_NAME#v}"
            echo "tags=ghcr.io/${{ github.repository }}:${VERSION_TAG},ghcr.io/${{ github.repository }}:latest,docker.io/${{ github.actor }}/webpass:${VERSION_TAG},docker.io/${{ github.actor }}/webpass:latest" >> $GITHUB_OUTPUT
            echo "version=${VERSION_TAG}" >> $GITHUB_OUTPUT
          else
            # workflow_dispatch: use short SHA, no latest
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tags=ghcr.io/${{ github.repository }}:sha-${SHORT_SHA},docker.io/${{ github.actor }}/webpass:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "version=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi
          echo "commit=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.version.outputs.tags }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_TIME=${{ steps.version.outputs.build_time }}
            COMMIT=${{ steps.version.outputs.commit }}
            FRONTEND_VERSION=${{ steps.version.outputs.version }}
            FRONTEND_BUILD_TIME=${{ steps.version.outputs.build_time }}
            FRONTEND_COMMIT=${{ steps.version.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: Build Container Image

on:
  push:
    branches:
      - custom-debian-xfce
    paths-ignore:
      - '*.md'
      - 'LICENSE'
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKER_IMAGE: docker.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VERSION=${{ github.sha }}

name: Deploy Frontend

on:
  push:
    tags:
      - "v*"
    paths-ignore:
      - ".qwen/**"
  workflow_dispatch:
    paths-ignore:
      - ".qwen/**"

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Set short SHA for non-tag builds
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "version=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          FRONTEND_VERSION: ${{ steps.version.outputs.version }}
          FRONTEND_COMMIT: ${{ github.sha }}
          FRONTEND_BUILD_TIME: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Check if Pages project exists
        id: check-project
        run: |
          echo "Checking if Cloudflare Pages project exists..."
          if wrangler pages project list 2>/dev/null | grep -q "${{ vars.CLOUDFLARE_PAGES_PROJECT }}"; then
            echo "project_exists=true" >> $GITHUB_OUTPUT
          else
            echo "project_exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create Pages project if not exists
        if: steps.check-project.outputs.project_exists == 'false'
        run: |
          echo "Creating Cloudflare Pages project: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}"
          wrangler pages project create ${{ vars.CLOUDFLARE_PAGES_PROJECT }} --production-branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages (Production)
        if: github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy frontend/dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages (Preview)
        if: github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy frontend/dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --commit-dirty=true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

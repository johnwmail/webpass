name: Deploy Frontend

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Check if Pages project exists
        id: check-project
        run: |
          echo "Checking if Cloudflare Pages project exists..."
          if wrangler pages project list 2>/dev/null | grep -q "${{ vars.CLOUDFLARE_PAGES_PROJECT }}"; then
            echo "project_exists=true" >> $GITHUB_OUTPUT
          else
            echo "project_exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create Pages project if not exists
        if: steps.check-project.outputs.project_exists == 'false'
        run: |
          echo "Creating Cloudflare Pages project: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}"
          wrangler pages project create ${{ vars.CLOUDFLARE_PAGES_PROJECT }} --production-branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy frontend/dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

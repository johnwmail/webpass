<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebPass - Theme Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  
  <style>
    /* Base Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      transition: all 0.3s ease;
    }

    /* Theme Switcher Panel */
    .theme-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--bg-secondary);
      border: var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      z-index: 10000;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      max-width: 320px;
    }

    .theme-panel h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .theme-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border: 2px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 12px;
      font-weight: 500;
    }

    .theme-btn:hover {
      transform: translateY(-2px);
    }

    .theme-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }

    .theme-preview {
      width: 100%;
      height: 40px;
      border-radius: 8px;
      display: flex;
      overflow: hidden;
    }

    .theme-preview span {
      flex: 1;
      height: 100%;
    }

    /* Theme Variables */
    [data-theme="indigo"] {
      --bg: #0a0e1a;
      --bg-secondary: #111827;
      --bg-tertiary: #1f2937;
      --border: #374151;
      --border-light: #4b5563;
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --text-dim: #6b7280;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --accent-bg: rgba(99, 102, 241, 0.12);
      --accent-glow: rgba(99, 102, 241, 0.4);
      --gradient-main: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
      --gradient-bg: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b);
      --glass-bg: rgba(17, 24, 39, 0.7);
      --glass-border: 1px solid rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    [data-theme="emerald"] {
      --bg: #022c22;
      --bg-secondary: #064e3b;
      --bg-tertiary: #065f46;
      --border: #047857;
      --border-light: #10b981;
      --text: #f0fdf4;
      --text-muted: #86efac;
      --text-dim: #4ade80;
      --accent: #10b981;
      --accent-hover: #34d399;
      --accent-bg: rgba(16, 185, 129, 0.12);
      --accent-glow: rgba(16, 185, 129, 0.4);
      --gradient-main: linear-gradient(135deg, #10b981 0%, #34d399 50%, #6ee7b7 100%);
      --gradient-bg: linear-gradient(-45deg, #022c22, #064e3b, #065f46, #047857);
      --glass-bg: rgba(6, 78, 59, 0.7);
      --glass-border: 1px solid rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --danger: #f87171;
      --warning: #fbbf24;
    }

    [data-theme="rose"] {
      --bg: #1a0505;
      --bg-secondary: #2a0a0a;
      --bg-tertiary: #3f0d0d;
      --border: #5c1a1a;
      --border-light: #7f2d2d;
      --text: #fef2f2;
      --text-muted: #fca5a5;
      --text-dim: #f87171;
      --accent: #f43f5e;
      --accent-hover: #fb7185;
      --accent-bg: rgba(244, 63, 94, 0.12);
      --accent-glow: rgba(244, 63, 94, 0.4);
      --gradient-main: linear-gradient(135deg, #f43f5e 0%, #fb7185 50%, #fda4af 100%);
      --gradient-bg: linear-gradient(-45deg, #1a0505, #2a0a0a, #3f0d0d, #5c1a1a);
      --glass-bg: rgba(42, 10, 10, 0.7);
      --glass-border: 1px solid rgba(255, 255, 255, 0.08);
      --success: #34d399;
      --danger: #f43f5e;
      --warning: #fbbf24;
    }

    [data-theme="amber"] {
      --bg: #1a1500;
      --bg-secondary: #2a2200;
      --bg-tertiary: #3f3300;
      --border: #5c4d00;
      --border-light: #7f6b00;
      --text: #fefce8;
      --text-muted: #fde047;
      --text-dim: #facc15;
      --accent: #f59e0b;
      --accent-hover: #fbbf24;
      --accent-bg: rgba(245, 158, 11, 0.12);
      --accent-glow: rgba(245, 158, 11, 0.4);
      --gradient-main: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #fcd34d 100%);
      --gradient-bg: linear-gradient(-45deg, #1a1500, #2a2200, #3f3300, #5c4d00);
      --glass-bg: rgba(42, 34, 0, 0.7);
      --glass-border: 1px solid rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    [data-theme="ocean"] {
      --bg: #001a2e;
      --bg-secondary: #002a4a;
      --bg-tertiary: #003d6b;
      --border: #005a8c;
      --border-light: #0077b6;
      --text: #f0f9ff;
      --text-muted: #7dd3fc;
      --text-dim: #38bdf8;
      --accent: #0ea5e9;
      --accent-hover: #38bdf8;
      --accent-bg: rgba(14, 165, 233, 0.12);
      --accent-glow: rgba(14, 165, 233, 0.4);
      --gradient-main: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 50%, #7dd3fc 100%);
      --gradient-bg: linear-gradient(-45deg, #001a2e, #002a4a, #003d6b, #005a8c);
      --glass-bg: rgba(0, 42, 74, 0.7);
      --glass-border: 1px solid rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --danger: #f87171;
      --warning: #fbbf24;
    }

    [data-theme="slate"] {
      --bg: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --border: #475569;
      --border-light: #64748b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --accent: #38bdf8;
      --accent-hover: #7dd3fc;
      --accent-bg: rgba(56, 189, 248, 0.12);
      --accent-glow: rgba(56, 189, 248, 0.4);
      --gradient-main: linear-gradient(135deg, #38bdf8 0%, #7dd3fc 50%, #bae6fd 100%);
      --gradient-bg: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #475569);
      --glass-bg: rgba(30, 41, 59, 0.7);
      --glass-border: 1px solid rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --danger: #f87171;
      --warning: #fbbf24;
    }

    /* User Custom Themes */
    [data-theme="drak"] {
      --bg: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --border: #475569;
      --border-light: #64748b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --accent-bg: rgba(59, 130, 246, 0.12);
      --accent-glow: rgba(59, 130, 246, 0.3);
      --gradient-main: linear-gradient(135deg, #3b82f6 0%, #2563eb 50%, #1d4ed8 100%);
      --gradient-bg: linear-gradient(-45deg, #0f172a, #1e293b, #1e293b, #334155);
      --glass-bg: rgba(30, 41, 59, 0.8);
      --glass-border: 1px solid rgba(148, 163, 184, 0.1);
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    [data-theme="daylight"] {
      --bg: #ffffff;
      --bg-secondary: #f1f5f9;
      --bg-tertiary: #e2e8f0;
      --border: #cbd5e1;
      --border-light: #94a3b8;
      --text: #1e293b;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-bg: rgba(59, 130, 246, 0.1);
      --accent-glow: rgba(59, 130, 246, 0.2);
      --gradient-main: linear-gradient(135deg, #3b82f6 0%, #2563eb 50%, #1d4ed8 100%);
      --gradient-bg: linear-gradient(-45deg, #ffffff, #f8fafc, #f1f5f9, #e2e8f0);
      --glass-bg: rgba(255, 255, 255, 0.9);
      --glass-border: 1px solid rgba(148, 163, 184, 0.3);
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    /* Apply theme */
    body {
      background: var(--gradient-bg);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      color: var(--text);
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Demo Content */
    .demo-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .demo-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: var(--glass-border);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .demo-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .demo-logo {
      font-size: 48px;
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 12px var(--accent-glow));
    }

    .demo-title {
      font-size: 28px;
      font-weight: 800;
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .demo-subtitle {
      color: var(--text-muted);
      font-size: 14px;
    }

    .demo-form .field {
      margin-bottom: 20px;
    }

    .demo-form .label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .demo-form .input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s ease;
      outline: none;
    }

    .demo-form .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }

    .demo-form .input::placeholder {
      color: var(--text-dim);
    }

    .demo-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      background: var(--gradient-main);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    .demo-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    .demo-btn:active {
      transform: translateY(0);
    }

    .demo-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .demo-btn-secondary {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text);
      box-shadow: none;
    }

    .demo-btn-secondary:hover {
      background: var(--border);
      box-shadow: none;
    }

    .theme-info {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    .theme-colors {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }

    .theme-color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
    }
  </style>
</head>
<body data-theme="indigo">
  <!-- Theme Switcher Panel -->
  <div class="theme-panel">
    <h3>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      Choose Theme
    </h3>
    <div class="theme-grid">
      <button class="theme-btn active" data-theme="indigo" onclick="setTheme('indigo')">
        <div class="theme-preview">
          <span style="background: #0f172a"></span>
          <span style="background: #1e1b4b"></span>
          <span style="background: #6366f1"></span>
        </div>
        Indigo (Default)
      </button>
      <button class="theme-btn" data-theme="emerald" onclick="setTheme('emerald')">
        <div class="theme-preview">
          <span style="background: #022c22"></span>
          <span style="background: #064e3b"></span>
          <span style="background: #10b981"></span>
        </div>
        Emerald
      </button>
      <button class="theme-btn" data-theme="rose" onclick="setTheme('rose')">
        <div class="theme-preview">
          <span style="background: #1a0505"></span>
          <span style="background: #2a0a0a"></span>
          <span style="background: #f43f5e"></span>
        </div>
        Rose
      </button>
      <button class="theme-btn" data-theme="amber" onclick="setTheme('amber')">
        <div class="theme-preview">
          <span style="background: #1a1500"></span>
          <span style="background: #2a2200"></span>
          <span style="background: #f59e0b"></span>
        </div>
        Amber
      </button>
      <button class="theme-btn" data-theme="ocean" onclick="setTheme('ocean')">
        <div class="theme-preview">
          <span style="background: #001a2e"></span>
          <span style="background: #002a4a"></span>
          <span style="background: #0ea5e9"></span>
        </div>
        Ocean
      </button>
      <button class="theme-btn" data-theme="slate" onclick="setTheme('slate')">
        <div class="theme-preview">
          <span style="background: #0f172a"></span>
          <span style="background: #1e293b"></span>
          <span style="background: #38bdf8"></span>
        </div>
        Slate
      </button>
      <button class="theme-btn" data-theme="drak" onclick="setTheme('drak')">
        <div class="theme-preview">
          <span style="background: #0f172a"></span>
          <span style="background: #1e293b"></span>
          <span style="background: #3b82f6"></span>
        </div>
        Drak (Your Dark)
      </button>
      <button class="theme-btn" data-theme="daylight" onclick="setTheme('daylight')">
        <div class="theme-preview">
          <span style="background: #ffffff; border: 1px solid #ddd;"></span>
          <span style="background: #f1f5f9"></span>
          <span style="background: #3b82f6"></span>
        </div>
        Daylight (Your Light)
      </button>
    </div>
    <div class="theme-info">
      <p>Preview themes in real-time</p>
      <div class="theme-colors" id="themeColors">
        <div class="theme-color-swatch" style="background: #0f172a"></div>
        <div class="theme-color-swatch" style="background: #1e1b4b"></div>
        <div class="theme-color-swatch" style="background: #6366f1"></div>
        <div class="theme-color-swatch" style="background: #10b981"></div>
        <div class="theme-color-swatch" style="background: #f43f5e"></div>
      </div>
    </div>
  </div>

  <!-- Demo Content -->
  <div class="demo-container">
    <div class="demo-card">
      <div class="demo-header">
        <div class="demo-logo">🔐</div>
        <h1 class="demo-title">WebPass</h1>
        <p class="demo-subtitle">Zero-knowledge password manager</p>
      </div>

      <form class="demo-form">
        <div class="field">
          <label class="label">Account</label>
          <input type="text" class="input" placeholder="Select your account" />
        </div>
        <div class="field">
          <label class="label">Password</label>
          <input type="password" class="input" placeholder="Enter your password" />
        </div>
        <div class="demo-actions">
          <button type="button" class="demo-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Login
          </button>
          <button type="button" class="demo-btn demo-btn-secondary">Setup →</button>
        </div>
      </form>

      <div style="margin-top: 24px; padding: 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px;">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
          <div style="width: 40px; height: 40px; background: var(--gradient-main); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px;">🔑</div>
          <div style="flex: 1;">
            <div style="font-weight: 600; color: var(--text);">Sample Entry</div>
            <div style="font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;">••••••••••••</div>
          </div>
          <button class="demo-btn" style="padding: 8px 16px; font-size: 12px;">Copy</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function setTheme(themeName) {
      document.body.setAttribute('data-theme', themeName);
      
      // Update active button
      document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === themeName);
      });

      // Update color swatches
      const theme = getThemeColors(themeName);
      const swatchesContainer = document.getElementById('themeColors');
      swatchesContainer.innerHTML = theme.colors.map(color => 
        `<div class="theme-color-swatch" style="background: ${color}"></div>`
      ).join('');

      // Save preference
      localStorage.setItem('webpass-theme', themeName);
    }

    function getThemeColors(themeName) {
      const themes = {
        indigo: { colors: ['#0f172a', '#1e1b4b', '#6366f1', '#8b5cf6', '#a855f7'] },
        emerald: { colors: ['#022c22', '#064e3b', '#10b981', '#34d399', '#6ee7b7'] },
        rose: { colors: ['#1a0505', '#2a0a0a', '#f43f5e', '#fb7185', '#fda4af'] },
        amber: { colors: ['#1a1500', '#2a2200', '#f59e0b', '#fbbf24', '#fcd34d'] },
        ocean: { colors: ['#001a2e', '#002a4a', '#0ea5e9', '#38bdf8', '#7dd3fc'] },
        slate: { colors: ['#0f172a', '#1e293b', '#38bdf8', '#7dd3fc', '#bae6fd'] },
        drak: { colors: ['#0f172a', '#1e293b', '#3b82f6', '#2563eb', '#1d4ed8'] },
        daylight: { colors: ['#ffffff', '#f1f5f9', '#e2e8f0', '#3b82f6', '#2563eb'] }
      };
      return themes[themeName] || themes.indigo;
    }

    // Load saved theme
    const savedTheme = localStorage.getItem('webpass-theme') || 'indigo';
    setTheme(savedTheme);
  </script>
</body>
</html>
